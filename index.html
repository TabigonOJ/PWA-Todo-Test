<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#eaf6fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="モチベTODO">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <title>モチベTODO</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef8fc;
      --bg2: #e2f2f9;
      --surface: #ffffff;
      --surface2: #f4fbfe;
      --border: #c8e8f4;
      --border2: #b0d8ed;
      --sky: #7ec8e3;
      --sky-light: #d6f0fa;
      --sky-dark: #4da8cc;
      --sky-text: #2a7a9e;
      --mint: #a8ddc9;
      --mint-light: #ddf4ec;
      --mint-dark: #5eb89a;
      --mint-text: #2a7a5e;
      --peach: #f9c6b4;
      --peach-light: #fde8e0;
      --peach-dark: #e8846a;
      --peach-text: #9a4a32;
      --lavender: #c4b5e8;
      --lavender-light: #ece6f9;
      --lavender-dark: #8e75cc;
      --lavender-text: #5a3e9a;
      --yellow: #f9e4a0;
      --yellow-light: #fdf4d6;
      --yellow-text: #8a6a10;
      --coral: #ffb5b5;
      --coral-light: #ffe8e8;
      --text: #3a5a6a;
      --text-muted: #7aa0b0;
      --text-light: #aac8d8;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-pill: 100px;
      --shadow-soft: 0 2px 12px rgba(100,180,210,0.15);
      --shadow-card: 0 4px 20px rgba(100,180,210,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Zen Maru Gothic','Noto Sans JP',sans-serif;
      font-size: 15px;
      line-height: 1.65;
    }

    body::before {
      content:''; position:fixed; top:-120px; right:-120px;
      width:380px; height:380px;
      background:radial-gradient(circle,#c8e8f4 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-100px; left:-100px;
      width:300px; height:300px;
      background:radial-gradient(circle,#ddf4ec 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    #app {
      position:relative; z-index:1;
      max-width:680px; margin:0 auto;
      padding:0 16px 80px;
    }

    /* ── HEADER ── */
    header {
      padding:36px 4px 16px;
      opacity:0; animation:fadeUp 0.6s ease forwards 0.1s;
    }
    .header-inner {
      display:flex; align-items:flex-end; justify-content:space-between;
    }
    .logo-area h1 {
      font-size:clamp(1.6rem,6vw,2.2rem); font-weight:700;
      color:var(--sky-text); letter-spacing:-0.01em; line-height:1.1;
    }
    .logo-area h1 .wave {
      display:inline-block; animation:wave 2s ease-in-out infinite;
    }
    .logo-area .subtitle { font-size:12px; color:var(--text-muted); margin-top:4px; }
    .header-date-badge {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:8px 14px;
      text-align:center; box-shadow:var(--shadow-soft);
    }
    .date-day { font-size:22px; font-weight:700; color:var(--sky-text); line-height:1; }
    .date-label { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* ── NAV TABS ── */
    .nav-tabs {
      display:flex; gap:4px; margin-bottom:16px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:6px;
      box-shadow:var(--shadow-soft);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.15s;
    }
    .nav-tab {
      flex:1; padding:8px 6px; border:none;
      background:transparent; border-radius:var(--radius-sm);
      font-family:inherit; font-size:12px; font-weight:500;
      color:var(--text-muted); cursor:pointer; transition:all 0.2s;
      white-space:nowrap;
    }
    .nav-tab.active {
      background:var(--sky-light); color:var(--sky-text);
    }

    /* ── VIEWS ── */
    .view { display:none; }
    .view.active { display:block; }

    /* ── PROGRESS CARD ── */
    .progress-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:18px 20px; margin-bottom:16px;
      box-shadow:var(--shadow-card);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.2s;
    }
    .progress-top {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .stats-row { display:flex; gap:16px; }
    .stat { display:flex; flex-direction:column; align-items:center; }
    .stat-num { font-size:22px; font-weight:700; line-height:1; }
    .stat-label { font-size:10px; color:var(--text-muted); margin-top:2px; }
    .stat-num.sky { color:var(--sky-dark); }
    .stat-num.mint { color:var(--mint-dark); }
    .stat-num.total { color:var(--text-muted); }
    .progress-pct { font-size:14px; font-weight:700; color:var(--sky-text); }
    .progress-track {
      height:8px; background:var(--bg2);
      border-radius:var(--radius-pill); overflow:hidden;
    }
    .progress-fill {
      height:100%;
      background:linear-gradient(90deg,var(--sky) 0%,var(--mint) 100%);
      border-radius:var(--radius-pill);
      transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── 目標カード（ホーム） ── */
    .goal-summary-row {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
      margin-bottom:16px;
      opacity:0; animation:fadeUp 0.6s ease forwards 0.25s;
    }
    .goal-mini-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:12px 14px;
      box-shadow:var(--shadow-soft); cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .goal-mini-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-card); }
    .goal-mini-label {
      font-size:10px; font-weight:700; letter-spacing:0.04em;
      margin-bottom:4px; opacity:0.7;
    }
    .goal-mini-text {
      font-size:12px; color:var(--text); line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .goal-mini-card.short { border-top:3px solid var(--sky); }
    .goal-mini-card.short .goal-mini-label { color:var(--sky-text); }
    .goal-mini-card.mid   { border-top:3px solid var(--mint); }
    .goal-mini-card.mid .goal-mini-label { color:var(--mint-text); }
    .goal-mini-card.long  { border-top:3px solid var(--lavender); }
    .goal-mini-card.long .goal-mini-label { color:var(--lavender-text); }
    .goal-mini-empty { font-size:11px; color:var(--text-light); }

    /* ── 今日のタスクセクション ── */
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px;
      opacity:0; animation:fadeUp 0.6s ease forwards 0.3s;
    }
    .section-title { font-size:13px; font-weight:700; color:var(--text-muted); letter-spacing:0.04em; }
    .section-action {
      font-size:11px; color:var(--sky-text); cursor:pointer;
      background:none; border:none; font-family:inherit; padding:0;
    }

    /* ── 入力カード ── */
    .input-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; margin-bottom:14px;
      box-shadow:var(--shadow-card);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.3s;
    }
    .input-row { display:flex; gap:8px; margin-bottom:10px; }
    .todo-input-field {
      flex:1; background:var(--surface2);
      border:1.5px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 14px; font-size:14px; color:var(--text);
      font-family:inherit; outline:none; transition:border-color 0.2s,box-shadow 0.2s;
    }
    .todo-input-field::placeholder { color:var(--text-light); }
    .todo-input-field:focus {
      border-color:var(--sky); box-shadow:0 0 0 3px rgba(126,200,227,0.2);
    }
    .add-btn {
      width:44px; height:44px; background:var(--sky); border:none;
      border-radius:var(--radius-sm); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s,transform 0.1s; flex-shrink:0;
    }
    .add-btn:hover { background:var(--sky-dark); }
    .add-btn:active { transform:scale(0.92); }
    .add-btn svg { width:18px; height:18px; stroke:#fff; stroke-width:2.5; }

    .row-label { font-size:11px; color:var(--text-muted); margin-bottom:5px; font-weight:500; }
    .chip-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
    .chip {
      padding:5px 12px; border-radius:var(--radius-pill);
      border:1.5px solid var(--border); background:var(--surface2);
      font-size:12px; color:var(--text-muted); cursor:pointer;
      transition:all 0.15s; font-family:inherit; font-weight:500;
    }
    .chip:hover { border-color:var(--sky); color:var(--sky-text); }
    .chip.sel-sky { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }
    .chip.sel-mint { background:var(--mint-light); border-color:var(--mint); color:var(--mint-text); }
    .chip.sel-peach { background:var(--peach-light); border-color:var(--peach); color:var(--peach-text); }
    .chip.sel-lavender { background:var(--lavender-light); border-color:var(--lavender); color:var(--lavender-text); }

    /* goal link chips */
    .chip.sel-goal-short { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }
    .chip.sel-goal-mid   { background:var(--mint-light); border-color:var(--mint); color:var(--mint-text); }
    .chip.sel-goal-long  { background:var(--lavender-light); border-color:var(--lavender); color:var(--lavender-text); }
    .chip.sel-goal-none  { background:var(--surface2); border-color:var(--border); color:var(--text-muted); }

    .input-extra-row { display:flex; gap:8px; align-items:center; }
    .date-input {
      flex:1; background:var(--surface2);
      border:1.5px solid var(--border); border-radius:var(--radius-sm);
      padding:6px 10px; font-size:12px; color:var(--text);
      font-family:inherit; outline:none;
    }
    .date-input:focus { border-color:var(--sky); }

    .pri-row { display:flex; gap:6px; }
    .pri-chip {
      padding:5px 12px; border-radius:var(--radius-pill);
      border:1.5px solid var(--border); background:var(--surface2);
      font-size:12px; color:var(--text-muted); cursor:pointer;
      transition:all 0.15s; font-family:inherit; font-weight:500;
    }
    .pri-chip:hover { border-color:var(--sky); }
    .pri-chip[data-p="high"].sel { background:var(--peach-light); border-color:var(--peach); color:var(--peach-text); }
    .pri-chip[data-p="medium"].sel { background:var(--yellow-light); border-color:#e8d070; color:#8a6a10; }
    .pri-chip[data-p="low"].sel { background:var(--mint-light); border-color:var(--mint); color:var(--mint-text); }

    /* ── フィルタータブ ── */
    .filter-tabs {
      display:flex; gap:6px; margin-bottom:12px;
    }
    .tab-btn {
      flex:1; padding:8px 6px;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); font-family:inherit;
      font-size:12px; font-weight:500; color:var(--text-muted);
      cursor:pointer; transition:all 0.2s;
    }
    .tab-btn.active { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }

    /* ── TODO ITEM ── */
    #todo-list { display:flex; flex-direction:column; gap:10px; }
    .empty-state {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:48px 24px;
      text-align:center; box-shadow:var(--shadow-soft);
    }
    .empty-icon { font-size:36px; margin-bottom:10px; }
    .empty-text { font-size:13px; color:var(--text-muted); }

    .todo-item {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:14px 16px;
      display:flex; align-items:flex-start; gap:12px;
      box-shadow:var(--shadow-soft);
      transition:transform 0.2s,box-shadow 0.2s;
      animation:itemIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position:relative;
    }
    .todo-item:hover { transform:translateY(-2px); box-shadow:var(--shadow-card); }
    .todo-item::before {
      content:''; position:absolute; left:0; top:12px; bottom:12px;
      width:4px; border-radius:0 4px 4px 0; background:var(--sky);
    }
    .todo-item.cat-仕事::before { background:var(--sky); }
    .todo-item.cat-個人::before { background:var(--lavender); }
    .todo-item.cat-買い物::before { background:var(--mint); }
    .todo-item.cat-その他::before { background:var(--peach); }
    .todo-item.done { opacity:0.55; background:var(--surface2); }
    .todo-item.done:hover { transform:none; box-shadow:var(--shadow-soft); }
    .todo-item.removing { animation:itemOut 0.3s ease forwards; }
    .todo-item.overdue::after {
      content:'期限超過'; position:absolute; top:10px; right:46px;
      font-size:10px; background:var(--peach-light); color:var(--peach-text);
      padding:2px 7px; border-radius:var(--radius-pill);
      border:1px solid var(--peach);
    }

    .check-btn {
      width:24px; height:24px; border-radius:50%;
      border:2px solid var(--border2); background:var(--surface2);
      cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; margin-top:1px;
    }
    .check-btn:hover { border-color:var(--sky); background:var(--sky-light); }
    .todo-item.done .check-btn { background:var(--mint); border-color:var(--mint); }
    .check-btn svg { width:12px; height:12px; stroke:#fff; stroke-width:3; opacity:0; transition:opacity 0.15s; }
    .todo-item.done .check-btn svg { opacity:1; }

    .todo-content { flex:1; min-width:0; }
    .todo-text {
      font-size:14px; color:var(--text); line-height:1.5; word-break:break-word; transition:all 0.2s;
    }
    .todo-item.done .todo-text { text-decoration:line-through; color:var(--text-light); }
    .todo-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .meta-tag {
      font-size:11px; padding:2px 8px; border-radius:var(--radius-pill); font-weight:500;
    }
    .meta-cat-仕事 { background:var(--sky-light); color:var(--sky-text); }
    .meta-cat-個人 { background:var(--lavender-light); color:var(--lavender-text); }
    .meta-cat-買い物 { background:var(--mint-light); color:var(--mint-text); }
    .meta-cat-その他 { background:var(--peach-light); color:var(--peach-text); }
    .meta-pri-high { background:var(--peach-light); color:var(--peach-text); }
    .meta-pri-medium { background:var(--yellow-light); color:#8a6a10; }
    .meta-pri-low { background:var(--mint-light); color:var(--mint-text); }
    .meta-goal-short { background:var(--sky-light); color:var(--sky-text); }
    .meta-goal-mid { background:var(--mint-light); color:var(--mint-text); }
    .meta-goal-long { background:var(--lavender-light); color:var(--lavender-text); }
    .meta-date { font-size:11px; color:var(--text-light); }
    .meta-deadline { font-size:11px; color:var(--peach-text); }

    .todo-actions { flex-shrink:0; opacity:0; transition:opacity 0.2s; }
    .todo-item:hover .todo-actions { opacity:1; }
    @media (max-width:480px) { .todo-actions { opacity:1; } }
    .del-btn {
      width:30px; height:30px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.15s;
    }
    .del-btn:hover { background:var(--peach-light); border-color:var(--peach); }
    .del-btn svg { width:13px; height:13px; stroke:var(--text-light); stroke-width:2; transition:stroke 0.15s; }
    .del-btn:hover svg { stroke:var(--peach-text); }

    /* ── 目標管理ビュー ── */
    .goal-set-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:18px 20px; margin-bottom:14px;
      box-shadow:var(--shadow-card);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.2s;
    }
    .goal-set-title {
      font-size:13px; font-weight:700; color:var(--text-muted);
      letter-spacing:0.05em; margin-bottom:14px;
    }
    .goal-item-row {
      display:flex; gap:10px; margin-bottom:10px; align-items:center;
    }
    .goal-badge {
      flex-shrink:0; width:48px; height:48px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px;
    }
    .goal-badge.short { background:var(--sky-light); }
    .goal-badge.mid   { background:var(--mint-light); }
    .goal-badge.long  { background:var(--lavender-light); }
    .goal-input-wrap { flex:1; display:flex; flex-direction:column; gap:4px; }
    .goal-type-label { font-size:11px; font-weight:700; color:var(--text-muted); }
    .goal-type-label.short { color:var(--sky-text); }
    .goal-type-label.mid   { color:var(--mint-text); }
    .goal-type-label.long  { color:var(--lavender-text); }
    .goal-text-input {
      background:var(--surface2); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); padding:8px 12px;
      font-size:13px; color:var(--text); font-family:inherit; outline:none;
      transition:border-color 0.2s;
    }
    .goal-text-input:focus { border-color:var(--sky); }
    .goal-text-input::placeholder { color:var(--text-light); }

    .goal-deadline-row { display:flex; gap:8px; margin-top:6px; }
    .goal-save-btn {
      width:100%; margin-top:12px; padding:11px;
      background:var(--sky); border:none; border-radius:var(--radius-sm);
      font-family:inherit; font-size:14px; font-weight:700; color:#fff;
      cursor:pointer; transition:background 0.15s;
    }
    .goal-save-btn:hover { background:var(--sky-dark); }

    /* goal progress row */
    .goal-progress-section {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:16px 18px; margin-bottom:12px;
      box-shadow:var(--shadow-soft);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.35s;
    }
    .goal-prog-row {
      display:flex; align-items:center; gap:10px; margin-bottom:10px;
    }
    .goal-prog-row:last-child { margin-bottom:0; }
    .goal-prog-label { width:50px; font-size:11px; font-weight:700; }
    .goal-prog-label.short { color:var(--sky-text); }
    .goal-prog-label.mid   { color:var(--mint-text); }
    .goal-prog-label.long  { color:var(--lavender-text); }
    .goal-prog-text {
      flex:1; font-size:12px; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .goal-prog-pct { font-size:12px; font-weight:700; color:var(--text-muted); width:36px; text-align:right; }
    .mini-track { flex-shrink:0; width:80px; height:6px; background:var(--bg2); border-radius:var(--radius-pill); overflow:hidden; }
    .mini-fill { height:100%; border-radius:var(--radius-pill); transition:width 0.5s; }
    .mini-fill.short { background:linear-gradient(90deg,var(--sky),var(--sky-dark)); }
    .mini-fill.mid   { background:linear-gradient(90deg,var(--mint),var(--mint-dark)); }
    .mini-fill.long  { background:linear-gradient(90deg,var(--lavender),var(--lavender-dark)); }

    /* ── 記録ビュー ── */
    .record-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:18px; margin-bottom:14px;
      box-shadow:var(--shadow-card);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.2s;
    }
    .record-card-title { font-size:13px; font-weight:700; color:var(--text-muted); margin-bottom:12px; letter-spacing:0.04em; }
    .record-textarea {
      width:100%; min-height:90px; background:var(--surface2);
      border:1.5px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 14px; font-size:13px; color:var(--text);
      font-family:inherit; outline:none; resize:vertical;
      transition:border-color 0.2s; margin-bottom:10px;
    }
    .record-textarea:focus { border-color:var(--sky); }
    .record-textarea::placeholder { color:var(--text-light); }
    .record-save-btn {
      width:100%; padding:10px; background:var(--mint); border:none;
      border-radius:var(--radius-sm); font-family:inherit; font-size:13px;
      font-weight:700; color:#fff; cursor:pointer; transition:background 0.15s;
    }
    .record-save-btn:hover { background:var(--mint-dark); }

    .record-history { display:flex; flex-direction:column; gap:10px; }
    .record-entry {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:14px 16px;
      box-shadow:var(--shadow-soft);
      animation:itemIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .record-entry-date {
      font-size:11px; color:var(--text-light); margin-bottom:6px;
    }
    .record-entry-text { font-size:13px; color:var(--text); line-height:1.6; }
    .record-entry-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .record-mood {
      font-size:11px; padding:2px 8px; border-radius:var(--radius-pill);
      background:var(--yellow-light); color:var(--yellow-text);
    }

    /* mood buttons */
    .mood-row { display:flex; gap:8px; margin-bottom:10px; }
    .mood-btn {
      padding:6px 12px; border-radius:var(--radius-pill);
      border:1.5px solid var(--border); background:var(--surface2);
      font-size:14px; cursor:pointer; transition:all 0.15s;
    }
    .mood-btn.sel { border-color:var(--sky); background:var(--sky-light); }

    /* ── カレンダービュー ── */
    .calendar-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:16px; margin-bottom:14px;
      box-shadow:var(--shadow-card);
      opacity:0; animation:fadeUp 0.6s ease forwards 0.2s;
    }
    .cal-nav {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
    }
    .cal-nav-btn {
      width:34px; height:34px; border-radius:var(--radius-sm);
      border:1.5px solid var(--border); background:var(--surface2);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; font-size:16px;
    }
    .cal-nav-btn:hover { background:var(--sky-light); border-color:var(--sky); }
    .cal-month { font-size:15px; font-weight:700; color:var(--sky-text); }
    .cal-grid {
      display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
    }
    .cal-weekday {
      text-align:center; font-size:11px; font-weight:700;
      color:var(--text-muted); padding:4px 0;
    }
    .cal-day {
      aspect-ratio:1; border-radius:var(--radius-sm);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:12px; cursor:pointer; transition:all 0.15s; position:relative;
      border:1.5px solid transparent;
    }
    .cal-day:hover { background:var(--sky-light); }
    .cal-day.other-month { color:var(--text-light); }
    .cal-day.today { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); font-weight:700; }
    .cal-day.selected { background:var(--sky); color:#fff; border-color:var(--sky-dark); font-weight:700; }
    .cal-day.has-record::after {
      content:''; position:absolute; bottom:3px;
      width:4px; height:4px; border-radius:50%; background:var(--mint);
    }
    .cal-day.has-done::after { background:var(--sky); }
    .cal-day.has-record.has-done::after { background:var(--lavender); }

    .cal-detail {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:16px; box-shadow:var(--shadow-soft);
    }
    .cal-detail-date { font-size:13px; font-weight:700; color:var(--sky-text); margin-bottom:10px; }
    .cal-detail-section { margin-bottom:10px; }
    .cal-detail-section-label { font-size:11px; color:var(--text-muted); font-weight:700; margin-bottom:6px; letter-spacing:0.04em; }
    .cal-detail-item {
      font-size:13px; color:var(--text); padding:6px 10px;
      background:var(--surface2); border-radius:8px; margin-bottom:4px;
      display:flex; align-items:center; gap:8px;
    }
    .cal-detail-item.done { text-decoration:line-through; color:var(--text-light); }

    /* ── footer clear ── */
    footer {
      padding:20px 4px 0; display:flex; justify-content:center; gap:10px;
    }
    .clear-btn {
      background:none; border:1.5px solid var(--border);
      border-radius:var(--radius-pill); padding:8px 20px;
      font-family:inherit; font-size:12px; color:var(--text-muted);
      cursor:pointer; transition:all 0.2s;
    }
    .clear-btn:hover { border-color:var(--peach); color:var(--peach-text); background:var(--peach-light); }

    /* ── offline / install banners ── */
    #offline-banner {
      position:fixed; top:0; left:0; right:0; z-index:200;
      background:var(--peach-light); color:var(--peach-text);
      border-bottom:1px solid var(--peach); text-align:center;
      padding:9px 16px; font-size:12px; font-weight:500;
      transform:translateY(-100%); transition:transform 0.3s;
    }
    #offline-banner.show { transform:translateY(0); }
    #install-banner {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%) translateY(100px); opacity:0;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:14px 18px;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 8px 32px rgba(100,180,210,0.22);
      z-index:100; transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),opacity 0.45s;
      white-space:nowrap;
    }
    #install-banner.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .install-text { font-size:13px; color:var(--text-muted); }
    .install-btn {
      padding:7px 16px; background:var(--sky); border:none;
      border-radius:var(--radius-sm); font-family:inherit;
      font-size:12px; font-weight:700; color:#fff; cursor:pointer; transition:background 0.15s;
    }
    .install-btn:hover { background:var(--sky-dark); }
    .install-close {
      background:none; border:none; color:var(--text-light); cursor:pointer; font-size:16px; line-height:1;
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes itemIn {
      from { opacity:0; transform:scale(0.96) translateY(6px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes itemOut {
      to { opacity:0; transform:translateX(16px) scale(0.95); max-height:0; margin:0; padding:0; border:0; }
    }
    @keyframes wave {
      0%,100% { transform:rotate(0deg); }
      25% { transform:rotate(12deg); }
      75% { transform:rotate(-8deg); }
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    /* ── Goal Tree ── */
    .goal-tree-empty {
      text-align:center; padding:32px 16px;
      background:var(--surface); border:1.5px dashed var(--border);
      border-radius:var(--radius); margin-bottom:12px;
      color:var(--text-muted); font-size:13px;
    }

    /* 長期カード */
    .gcard-long {
      background:var(--surface); border:1.5px solid var(--lavender);
      border-radius:var(--radius); margin-bottom:14px;
      box-shadow:var(--shadow-card);
      animation:fadeUp 0.45s ease forwards; opacity:0;
    }
    .gcard-long-header {
      display:flex; align-items:center; gap:10px;
      padding:14px 16px 10px;
      border-bottom:1px solid var(--lavender-light);
    }
    .gcard-long-icon { font-size:20px; }
    .gcard-long-body { flex:1; min-width:0; }
    .gcard-long-label { font-size:10px; font-weight:700; color:var(--lavender-text); letter-spacing:0.05em; }
    .gcard-long-text  { font-size:14px; font-weight:700; color:var(--text); line-height:1.3; }
    .gcard-long-dl    { font-size:11px; color:var(--text-light); margin-top:2px; }
    .gcard-long-stats { font-size:11px; color:var(--mint-text); font-weight:700; margin-top:2px; }
    .gcard-long-actions { display:flex; gap:6px; flex-shrink:0; }
    .gcard-del-btn {
      width:28px; height:28px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:12px; transition:all 0.15s;
    }
    .gcard-del-btn:hover { background:var(--peach-light); border-color:var(--peach); }

    /* 中期ブロック */
    .gcard-mids { padding:0 14px 8px; }
    .gcard-mid {
      border:1.5px solid var(--mint); border-radius:var(--radius-sm);
      margin-top:10px; background:var(--mint-light);
    }
    .gcard-mid-header {
      display:flex; align-items:center; gap:8px;
      padding:10px 12px 8px;
    }
    .gcard-mid-label { font-size:10px; font-weight:700; color:var(--mint-text); letter-spacing:0.05em; }
    .gcard-mid-text  { font-size:13px; font-weight:700; color:var(--text); flex:1; }
    .gcard-mid-dl    { font-size:11px; color:var(--text-light); }
    .gcard-mid-stats { font-size:11px; color:var(--mint-text); font-weight:700; }

    /* 短期ブロック */
    .gcard-shorts { padding:0 12px 8px 28px; }
    .gcard-short {
      display:flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:8px;
      background:var(--sky-light); border:1.5px solid var(--sky);
      margin-top:6px;
    }
    .gcard-short-label { font-size:10px; font-weight:700; color:var(--sky-text); flex-shrink:0; }
    .gcard-short-text  { font-size:12px; color:var(--text); flex:1; }
    .gcard-short-dl    { font-size:11px; color:var(--text-light); }
    .gcard-short-stats { font-size:11px; color:var(--sky-text); font-weight:700; }

    /* ＋追加ボタン（インライン） */
    .gcard-add-btn {
      width:100%; margin-top:8px; padding:7px;
      background:none; border:1.5px dashed var(--border2);
      border-radius:var(--radius-sm); font-family:inherit;
      font-size:12px; color:var(--text-muted); cursor:pointer;
      transition:all 0.15s; text-align:center;
    }
    .gcard-add-btn:hover { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }

    /* インライン追加フォーム */
    .inline-form {
      padding:10px; background:var(--surface);
      border:1.5px solid var(--sky); border-radius:var(--radius-sm);
      margin-top:8px; animation:fadeUp 0.25s ease forwards;
    }
    .inline-form input[type=text] {
      width:100%; background:var(--surface2);
      border:1.5px solid var(--border); border-radius:8px;
      padding:8px 12px; font-size:13px; color:var(--text);
      font-family:inherit; outline:none; margin-bottom:6px;
    }
    .inline-form input[type=text]:focus { border-color:var(--sky); }
    .inline-form input[type=date] {
      width:100%; background:var(--surface2);
      border:1.5px solid var(--border); border-radius:8px;
      padding:6px 10px; font-size:12px; color:var(--text);
      font-family:inherit; outline:none; margin-bottom:8px;
    }
    .inline-form-btns { display:flex; gap:6px; }
    .inline-form-ok {
      flex:1; padding:7px; background:var(--sky); border:none;
      border-radius:8px; font-family:inherit; font-size:12px;
      font-weight:700; color:#fff; cursor:pointer; transition:background 0.15s;
    }
    .inline-form-ok:hover { background:var(--sky-dark); }
    .inline-form-cancel {
      padding:7px 12px; background:none;
      border:1.5px solid var(--border); border-radius:8px;
      font-family:inherit; font-size:12px; color:var(--text-muted);
      cursor:pointer; transition:all 0.15s;
    }
    .inline-form-cancel:hover { border-color:var(--peach); color:var(--peach-text); }

    /* 孤立中期（長期に属さない） */
    .gcard-orphan-mid {
      background:var(--surface); border:1.5px solid var(--mint);
      border-radius:var(--radius); margin-bottom:14px;
      box-shadow:var(--shadow-soft);
      animation:fadeUp 0.45s ease forwards; opacity:0;
    }

    /* ── AI Goal Assist ── */
    .ai-assist-btn {
      width:100%; margin-top:10px; padding:10px 16px;
      background:linear-gradient(135deg,var(--lavender-light) 0%,var(--sky-light) 100%);
      border:1.5px solid var(--lavender); border-radius:var(--radius-sm);
      font-family:inherit; font-size:13px; font-weight:700;
      color:var(--lavender-text); cursor:pointer; transition:all 0.2s;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .ai-assist-btn:hover { background:linear-gradient(135deg,var(--lavender) 0%,var(--sky) 100%); color:#fff; border-color:var(--lavender-dark); }
    .ai-assist-btn:disabled { opacity:0.6; cursor:not-allowed; }

    .ai-result-card {
      margin-top:12px; padding:16px;
      background:linear-gradient(135deg,var(--lavender-light) 0%,var(--sky-light) 100%);
      border:1.5px solid var(--lavender); border-radius:var(--radius);
      animation:fadeUp 0.4s ease forwards;
    }
    .ai-result-title {
      font-size:12px; font-weight:700; color:var(--lavender-text);
      margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }
    .ai-result-section { margin-bottom:10px; }
    .ai-result-section:last-child { margin-bottom:0; }
    .ai-result-section-label {
      font-size:11px; font-weight:700; margin-bottom:6px;
    }
    .ai-result-section-label.mid  { color:var(--mint-text); }
    .ai-result-section-label.short { color:var(--sky-text); }
    .ai-suggestion-item {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.7); border-radius:8px;
      padding:7px 10px; margin-bottom:5px; cursor:pointer;
      border:1.5px solid transparent; transition:all 0.15s;
      font-size:13px; color:var(--text);
    }
    .ai-suggestion-item:hover { border-color:var(--lavender); background:#fff; }
    .ai-suggestion-item.applied { border-color:var(--mint); background:var(--mint-light); color:var(--mint-text); }
    .ai-suggestion-check { font-size:14px; }
    .ai-apply-all-btn {
      width:100%; margin-top:8px; padding:8px;
      background:var(--mint); border:none; border-radius:var(--radius-sm);
      font-family:inherit; font-size:12px; font-weight:700; color:#fff;
      cursor:pointer; transition:background 0.15s;
    }
    .ai-apply-all-btn:hover { background:var(--mint-dark); }
    .ai-loading {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:16px; color:var(--lavender-text); font-size:13px;
    }
    .ai-spinner {
      width:18px; height:18px; border:2px solid var(--lavender);
      border-top-color:var(--lavender-dark); border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="offline-banner">📡 オフラインです — データはローカルに保存されています</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <h1>モチベ<span class="wave">🌱</span>TODO</h1>
        <div class="subtitle" id="header-date"></div>
      </div>
      <div class="header-date-badge">
        <div class="date-day" id="date-day">--</div>
        <div class="date-label" id="date-label">--</div>
      </div>
    </div>
  </header>

  <!-- ナビ -->
  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="home">🏠 ホーム</button>
    <button class="nav-tab" data-view="goals">🎯 目標</button>
    <button class="nav-tab" data-view="tasks">📋 タスク</button>
    <button class="nav-tab" data-view="record">✏️ 記録</button>
    <button class="nav-tab" data-view="calendar">📅 履歴</button>
  </nav>

  <!-- ───── HOME VIEW ───── -->
  <div id="view-home" class="view active">
    <!-- 進捗 -->
    <div class="progress-card">
      <div class="progress-top">
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num sky" id="stat-active">0</div>
            <div class="stat-label">残り</div>
          </div>
          <div class="stat">
            <div class="stat-num mint" id="stat-done">0</div>
            <div class="stat-label">完了</div>
          </div>
          <div class="stat">
            <div class="stat-num total" id="stat-total">0</div>
            <div class="stat-label">合計</div>
          </div>
        </div>
        <div class="progress-pct" id="pct">0%</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- 目標サマリー -->
    <div class="goal-summary-row" id="home-goal-summary"></div>

    <!-- 今日のタスク -->
    <div class="section-header" style="animation-delay:0.3s">
      <div class="section-title">📌 TODAY'S TASKS</div>
      <button class="section-action" onclick="switchView('tasks')">すべて見る →</button>
    </div>

    <!-- 入力 -->
    <div class="input-card">
      <div class="input-row">
        <input type="text" id="todo-input-home" class="todo-input-field" placeholder="やることを入力してね ✏️" maxlength="200" autocomplete="off">
        <button class="add-btn" id="add-btn-home" aria-label="追加">
          <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="row-label">カテゴリ</div>
      <div class="chip-row" id="cat-chips-home">
        <button class="chip sel-sky" data-cat="仕事">💼 仕事</button>
        <button class="chip" data-cat="個人">🌸 個人</button>
        <button class="chip" data-cat="買い物">🛍 買い物</button>
        <button class="chip" data-cat="その他">✨ その他</button>
      </div>
      <div class="row-label">目標と紐づける</div>
      <div class="chip-row" id="goal-link-chips-home">
        <button class="chip sel-goal-none" data-goalid="">紐づけなし</button>
      </div>
      <div class="row-label">優先度</div>
      <div class="pri-row" id="pri-chips-home">
        <button class="pri-chip" data-p="high">🔴 高め</button>
        <button class="pri-chip sel" data-p="medium">🟡 ふつう</button>
        <button class="pri-chip" data-p="low">🟢 低め</button>
      </div>
    </div>

    <!-- フィルター -->
    <div class="filter-tabs">
      <button class="tab-btn" data-f="all">📋 すべて</button>
      <button class="tab-btn active" data-f="active">⏳ 未完了</button>
      <button class="tab-btn" data-f="done">✅ 完了</button>
    </div>

    <div id="todo-list"></div>
    <footer>
      <button class="clear-btn" id="clear-btn">完了済みをまとめて削除</button>
    </footer>
  </div>

  <!-- ───── GOALS VIEW ───── -->
  <div id="view-goals" class="view">
    <!-- ツリー（長期→中期→短期を展開表示） -->
    <div id="goal-tree-area"></div>

    <!-- 長期目標追加フォーム（常時表示） -->
    <div class="goal-set-card">
      <div class="goal-set-title">📙 長期目標を追加する</div>
      <div class="goal-item-row">
        <div class="goal-input-wrap">
          <input type="text" id="goal-new-long-text" class="goal-text-input" placeholder="例：外資系企業に転職する">
          <input type="date" id="goal-new-long-deadline" class="goal-text-input" style="margin-top:6px">
        </div>
      </div>
      <button class="ai-assist-btn" id="ai-assist-btn" style="margin-top:10px">
        💡 テンプレート提案を見る
      </button>
      <div id="ai-result-area"></div>
      <button class="goal-save-btn" id="goal-add-long-btn" style="margin-top:10px">📙 長期目標を追加</button>
    </div>

    <!-- 中期・短期はツリー内のボタンからインライン追加 -->
    <!-- インライン追加フォーム（JS で inject） -->
    <div id="goal-inline-form-area"></div>
  </div>

  <!-- ───── TASKS VIEW ───── -->
  <div id="view-tasks" class="view">
    <!-- 入力 -->
    <div class="input-card" style="animation-delay:0.15s">
      <div class="input-row">
        <input type="text" id="todo-input-tasks" class="todo-input-field" placeholder="タスクを追加する ✏️" maxlength="200" autocomplete="off">
        <button class="add-btn" id="add-btn-tasks" aria-label="追加">
          <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="row-label">カテゴリ</div>
      <div class="chip-row" id="cat-chips-tasks">
        <button class="chip sel-sky" data-cat="仕事">💼 仕事</button>
        <button class="chip" data-cat="個人">🌸 個人</button>
        <button class="chip" data-cat="買い物">🛍 買い物</button>
        <button class="chip" data-cat="その他">✨ その他</button>
      </div>
      <div class="row-label">目標と紐づける</div>
      <div class="chip-row" id="goal-link-chips-tasks">
        <button class="chip sel-goal-none" data-goalid="">紐づけなし</button>
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <div class="row-label">優先度</div>
          <div class="pri-row" id="pri-chips-tasks">

            <button class="pri-chip sel" data-p="medium">🟡 ふつう</button>
            <button class="pri-chip" data-p="low">🟢 低め</button>

        <div>
          <div class="row-label">期限</div>

    <!-- フィルター -->
    <div class="filter-tabs" id="filter-tabs-tasks">
      <button class="tab-btn" data-f="all">📋 すべて</button>
      <button class="tab-btn active" data-f="active">⏳ 未完了</button>
      <button class="tab-btn" data-f="done">✅ 完了</button>
      <button class="tab-btn" data-f="overdue">⚠️ 期限切れ</button>

    <div id="todo-list-tasks"></div>

      <button class="clear-btn" id="clear-btn-tasks">完了済みをまとめて削除</button>

  <!-- ───── RECORD VIEW ───── -->
  <div id="view-record" class="view">
    <div class="record-card">
      <div class="record-card-title">✏️ 今日の振り返りを書こう</div>
      <div class="row-label">今日の気分</div>
      <div class="mood-row" id="mood-btns">
        <button class="mood-btn" data-mood="😄">😄</button>
        <button class="mood-btn" data-mood="😊">😊</button>
        <button class="mood-btn" data-mood="😐">😐</button>
        <button class="mood-btn" data-mood="😔">😔</button>
        <button class="mood-btn" data-mood="😤">😤</button>
      </div>
      <textarea id="record-textarea" class="record-textarea" placeholder="今日やったこと、気づいたこと、明日に向けての一言など…"></textarea>
      <button class="record-save-btn" id="record-save-btn">📝 記録を保存する</button>
    </div>

    <div class="section-header" style="margin-bottom:10px">
      <div class="section-title">📚 過去の記録</div>
    </div>
    <div class="record-history" id="record-history"></div>
  </div>

  <!-- ───── CALENDAR VIEW ───── -->
  <div id="view-calendar" class="view">
    <div class="calendar-card">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">◀</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav-btn" id="cal-next">▶</button>
      </div>
      <div class="cal-grid" id="cal-weekdays"></div>
      <div class="cal-grid" id="cal-days" style="margin-top:4px"></div>
    </div>
    <div class="cal-detail" id="cal-detail" style="display:none"></div>
  </div>
</div><!-- #app -->

<div id="install-banner">
  <span class="install-text">ホーム画面に追加する？</span>
  <button class="install-btn" id="install-btn">追加する</button>
  <button class="install-close" id="install-close">✕</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const STORE_TODOS    = 'motitodo-todos';
const STORE_GOALS    = 'motitodo-goals';
const STORE_RECORDS  = 'motitodo-records';

let todos      = JSON.parse(localStorage.getItem(STORE_TODOS)   || '[]');
let goalNodes  = JSON.parse(localStorage.getItem(STORE_GOALS)   || '[]');
let records    = JSON.parse(localStorage.getItem(STORE_RECORDS) || '[]');

// 旧フォーマット移行（{short,mid,long,...} → []）
if (!Array.isArray(goalNodes)) goalNodes = [];

let filter   = 'active';
let filterT  = 'active';
let selCat   = '仕事';
let selPri   = 'medium';
let selGoalId    = '';   // '' = 紐づけなし
let selCatT  = '仕事';
let selPriT  = 'medium';
let selGoalIdT   = '';
let selGoalType  = 'long';  // 新規追加フォームの種別
let selParentId  = '';      // 新規追加フォームの親
let selMood  = '';
let calYear, calMonth;
let calSelectedDate = null;
let deferredPrompt = null;

const now = new Date();
calYear  = now.getFullYear();
calMonth = now.getMonth();

// ── Date display ──
const DAYS = ['日','月','火','水','木','金','土'];
const mm = String(now.getMonth()+1).padStart(2,'0');
const dd = String(now.getDate()).padStart(2,'0');
document.getElementById('header-date').textContent =
  `${now.getFullYear()}年${mm}月${dd}日 (${DAYS[now.getDay()]}曜日)`;
document.getElementById('date-day').textContent = dd;
document.getElementById('date-label').textContent = DAYS[now.getDay()] + '曜日';

// ══════════════════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════════════════
function save() { localStorage.setItem(STORE_TODOS, JSON.stringify(todos)); }
function saveGoals() { localStorage.setItem(STORE_GOALS, JSON.stringify(goalNodes)); }
function saveRecords() { localStorage.setItem(STORE_RECORDS, JSON.stringify(records)); }

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }
function isOverdue(t) {
  if (!t.deadline || t.done) return false;
  return new Date(t.deadline + 'T23:59:59') < new Date();
}

// ══════════════════════════════════════════════════════
//  VIEW SWITCHING
// ══════════════════════════════════════════════════════
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  document.getElementById('view-' + v).classList.add('active');
  if (v === 'home')     renderHome();
  if (v === 'goals')    renderGoals();
  if (v === 'tasks')    renderTasks();
  if (v === 'record')   renderRecord();
  if (v === 'calendar') renderCalendar();
}
document.querySelectorAll('.nav-tab').forEach(b => b.addEventListener('click', () => switchView(b.dataset.view)));

// ══════════════════════════════════════════════════════
//  HOME VIEW
// ══════════════════════════════════════════════════════
const CAT_SEL_MAP = {'仕事':'sel-sky','個人':'sel-lavender','買い物':'sel-mint','その他':'sel-peach'};
const TYPE_ICON = {long:'📙', mid:'📗', short:'📘'};
const TYPE_LABEL = {long:'長期', mid:'中期', short:'短期'};
const TYPE_COLOR = {long:'sel-lavender', mid:'sel-mint', short:'sel-sky'};

// ── ゴールリンクチップを動的に生成 ──
function buildGoalLinkChips(containerId, currentGoalId, onSelect) {
  const el = document.getElementById(containerId);
  // 短期目標のみ選択可能
  const shortGoals = goalNodes.filter(g => g.type === 'short');
  const chips = [`<button class="chip ${currentGoalId==='' ? 'sel-goal-none' : ''}" data-goalid="">紐づけなし</button>`];
  shortGoals.forEach(g => {
    const sel = currentGoalId === g.id ? 'sel-sky' : '';
    // 親中期・長期のパスを表示
    const midParent  = goalNodes.find(n => n.id === g.parentId);
    const longParent = midParent ? goalNodes.find(n => n.id === midParent.parentId) : null;
    const pathLabel  = longParent ? `${longParent.text.slice(0,8)}… ＞ ${midParent.text.slice(0,8)}… ＞` : midParent ? `${midParent.text.slice(0,10)}… ＞` : '';
    const label = `📘 ${esc(g.text.length>14 ? g.text.slice(0,14)+'…' : g.text)}`;
    chips.push(`<button class="chip ${sel}" data-goalid="${g.id}" title="${pathLabel} ${esc(g.text)}">${label}</button>`);
  });
  el.innerHTML = chips.join('');
  // イベントは一度だけ登録（cloneで既存リスナー除去）
  const clone = el.cloneNode(true);
  el.parentNode.replaceChild(clone, el);
  clone.addEventListener('click', e => {
    const btn = e.target.closest('[data-goalid]');
    if (!btn) return;
    clone.querySelectorAll('[data-goalid]').forEach(b => b.className = 'chip');
    const gid = btn.dataset.goalid;
    btn.className = 'chip ' + (gid === '' ? 'sel-goal-none' : 'sel-sky');
    onSelect(gid);
  });
}

function refreshGoalLinkChips() {
  buildGoalLinkChips('goal-link-chips-home',  selGoalId,  id => { selGoalId  = id; });
  buildGoalLinkChips('goal-link-chips-tasks', selGoalIdT, id => { selGoalIdT = id; });
}

// category home
document.getElementById('cat-chips-home').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  document.querySelectorAll('#cat-chips-home [data-cat]').forEach(b => b.className='chip');
  btn.classList.add('chip', CAT_SEL_MAP[btn.dataset.cat]);
  selCat = btn.dataset.cat;
});

// priority home
document.getElementById('pri-chips-home').addEventListener('click', e => {
  const btn = e.target.closest('[data-p]');
  if (!btn) return;
  document.querySelectorAll('#pri-chips-home [data-p]').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selPri = btn.dataset.p;
});

// category tasks
document.getElementById('cat-chips-tasks').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  document.querySelectorAll('#cat-chips-tasks [data-cat]').forEach(b => b.className='chip');
  btn.classList.add('chip', CAT_SEL_MAP[btn.dataset.cat]);
  selCatT = btn.dataset.cat;
});

// priority tasks
document.getElementById('pri-chips-tasks').addEventListener('click', e => {
  const btn = e.target.closest('[data-p]');
  if (!btn) return;
  document.querySelectorAll('#pri-chips-tasks [data-p]').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selPriT = btn.dataset.p;
});

// filter tabs home
document.querySelectorAll('.filter-tabs .tab-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.filter-tabs .tab-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  filter = b.dataset.f;
  renderTodoList();
}));

// filter tabs tasks
document.getElementById('filter-tabs-tasks').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]');
  if (!btn) return;
  document.querySelectorAll('#filter-tabs-tasks [data-f]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterT = btn.dataset.f;
  renderTasksList();
});

function makeTodo(text, cat, pri, goalId, deadline) {
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text, done: false, priority: pri, category: cat,
    goalId: goalId || '',
    deadline: deadline || '',
    createdAt: Date.now(),
    doneAt: null,
    doneDate: ''
  };
}

function addTodo(inputId, cat, pri, goalId, deadlineId) {
  const inp = document.getElementById(inputId);
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const dl = deadlineId ? document.getElementById(deadlineId).value : '';
  todos.unshift(makeTodo(text, cat, pri, goalId, dl));
  save();
  inp.value = '';
  renderHome();
  renderTasks();
  renderGoals();
}

document.getElementById('add-btn-home').addEventListener('click', () => addTodo('todo-input-home', selCat, selPri, selGoalId, ''));
document.getElementById('todo-input-home').addEventListener('keydown', e => { if (e.key==='Enter') addTodo('todo-input-home', selCat, selPri, selGoalId, ''); });
document.getElementById('add-btn-tasks').addEventListener('click', () => addTodo('todo-input-tasks', selCatT, selPriT, selGoalIdT, 'task-deadline'));
document.getElementById('todo-input-tasks').addEventListener('keydown', e => { if (e.key==='Enter') addTodo('todo-input-tasks', selCatT, selPriT, selGoalIdT, 'task-deadline'); });

function toggle(id) {
  const t = todos.find(t => t.id===id);
  if (t) {
    t.done = !t.done;
    t.doneAt = t.done ? Date.now() : null;
    t.doneDate = t.done ? todayKey() : '';
    save(); renderHome(); renderTasks(); renderGoals();
  }
}

function del(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) {
    el.classList.add('removing');
    el.addEventListener('animationend', () => {
      todos = todos.filter(t => t.id!==id);
      save(); renderHome(); renderTasks(); renderGoals();
    });
  }
}

function buildTodoItem(t) {
  const overdue = isOverdue(t);
  const linkedGoal = goalNodes.find(g => g.id === t.goalId);
  const priLabel  = {high:'高め',medium:'ふつう',low:'低め'};
  return `
    <div class="todo-item cat-${t.category} ${t.done?'done':''} ${overdue?'overdue':''}" data-id="${t.id}">
      <button class="check-btn" onclick="toggle('${t.id}')" aria-label="完了切替">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="todo-content">
        <div class="todo-text">${esc(t.text)}</div>
        <div class="todo-meta">
          <span class="meta-tag meta-cat-${t.category}">${esc(t.category)}</span>
          <span class="meta-tag meta-pri-${t.priority}">${priLabel[t.priority]}</span>
          ${linkedGoal ? `<span class="meta-tag meta-goal-${linkedGoal.type}">${TYPE_ICON[linkedGoal.type]} ${esc(linkedGoal.text.length>12 ? linkedGoal.text.slice(0,12)+'…' : linkedGoal.text)}</span>` : ''}
          ${t.deadline ? `<span class="meta-deadline">📅 ${t.deadline}</span>` : ''}
          <span class="meta-date">${fmtDate(t.createdAt)}</span>
        </div>
      </div>
      <div class="todo-actions">
        <button class="del-btn" onclick="del('${t.id}')" aria-label="削除">
          <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
}

function renderTodoList() {
  let list = todos;
  if (filter==='active') list = todos.filter(t => !t.done);
  if (filter==='done')   list = todos.filter(t => t.done);
  const el = document.getElementById('todo-list');
  if (list.length===0) {
    const empty = {all:'🌸 タスクがないよ〜', active:'🎉 全部終わった！', done:'まだ完了なし'};
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">${filter==='active'?'🎊':filter==='done'?'📝':'🌸'}</div><div class="empty-text">${empty[filter]}</div></div>`;
    return;
  }
  el.innerHTML = list.map(buildTodoItem).join('');
}

function renderProgressCard() {
  const active = todos.filter(t => !t.done).length;
  const done   = todos.filter(t => t.done).length;
  const total  = todos.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-total').textContent  = total;
  const pct = total===0 ? 0 : Math.round(done/total*100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderGoalSummary() {
  const el = document.getElementById('home-goal-summary');
  const longNodes = goalNodes.filter(g => g.type === 'long');
  const midOrphan = goalNodes.filter(g => g.type === 'mid' && !g.parentId);
  const shown = [...longNodes, ...midOrphan].slice(0, 3);
  if (shown.length === 0) {
    el.innerHTML = `<div class="goal-mini-card long" onclick="switchView('goals')" style="grid-column:1/-1">
      <div class="goal-mini-label">📙 長期目標</div>
      <div class="goal-mini-empty">目標を設定しよう →</div>
    </div>`;
    return;
  }
  el.innerHTML = shown.map(g => `
    <div class="goal-mini-card ${g.type}" onclick="switchView('goals')">
      <div class="goal-mini-label">${TYPE_ICON[g.type]} ${TYPE_LABEL[g.type]}目標</div>
      <div class="goal-mini-text">${esc(g.text)}</div>
    </div>`).join('');
}

function renderHome() {
  renderProgressCard();
  renderGoalSummary();
  renderTodoList();
}

document.getElementById('clear-btn').addEventListener('click', () => {
  todos = todos.filter(t => !t.done); save(); renderHome(); renderGoals();
});

// ══════════════════════════════════════════════════════
//  TASKS VIEW
// ══════════════════════════════════════════════════════
function renderTasksList() {
  let list = todos;
  if (filterT==='active')  list = todos.filter(t => !t.done);
  if (filterT==='done')    list = todos.filter(t => t.done);
  if (filterT==='overdue') list = todos.filter(t => isOverdue(t));
  const el = document.getElementById('todo-list-tasks');
  if (list.length===0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌸</div><div class="empty-text">タスクがありません</div></div>`;
    return;
  }
  el.innerHTML = list.map(buildTodoItem).join('');
}

function renderTasks() { renderTasksList(); }

document.getElementById('clear-btn-tasks').addEventListener('click', () => {
  todos = todos.filter(t => !t.done); save(); renderHome(); renderTasks(); renderGoals();
});

// ══════════════════════════════════════════════════════
//  GOALS VIEW
// ══════════════════════════════════════════════════════

function newGoalId() {
  return 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function descendantIds(id) {
  const children = goalNodes.filter(g => g.parentId === id);
  return children.flatMap(c => [c.id, ...descendantIds(c.id)]);
}

function goalProgress(id) {
  const allIds = [id, ...descendantIds(id)];
  const linked = todos.filter(t => allIds.includes(t.goalId));
  if (!linked.length) return null;
  const done = linked.filter(t => t.done).length;
  return { done, total: linked.length, pct: Math.round(done / linked.length * 100) };
}

function delGoal(id) {
  if (!confirm('この目標（と子目標）を削除しますか？')) return;
  const ids = [id, ...descendantIds(id)];
  goalNodes = goalNodes.filter(g => !ids.includes(g.id));
  todos.forEach(t => { if (ids.includes(t.goalId)) t.goalId = ''; });
  save(); saveGoals();
  renderGoals(); renderHome(); renderTasks(); refreshGoalLinkChips();
}

// ── インライン追加フォームを表示 ──
let _inlineTarget = null; // { parentId, type, insertAfterId }

function showInlineForm(parentId, type, insertAfterId) {
  // すでに同じフォームが開いていたら閉じる
  if (_inlineTarget && _inlineTarget.parentId === parentId && _inlineTarget.type === type) {
    closeInlineForm(); return;
  }
  _inlineTarget = { parentId, type };
  const label   = { mid:'中期目標（1〜6ヶ月）', short:'短期目標（〜1ヶ月）' }[type];
  const ph      = { mid:'例：英語で日常会話ができるようになる', short:'例：単語帳アプリで毎日10単語覚える' }[type];
  const formId  = 'inline-form-' + parentId + '-' + type;

  // 既存フォームを削除
  document.querySelectorAll('.inline-form').forEach(el => el.remove());

  const form = document.createElement('div');
  form.className = 'inline-form';
  form.id = formId;
  form.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--sky-text);margin-bottom:8px">${label}を追加</div>
    <input type="text" placeholder="${ph}" id="ilf-text">
    <input type="date" id="ilf-deadline">
    <div class="inline-form-btns">
      <button class="inline-form-ok" onclick="submitInlineForm('${parentId}','${type}')">追加する</button>
      <button class="inline-form-cancel" onclick="closeInlineForm()">キャンセル</button>
    </div>`;

  // insertAfterId の要素の後ろに挿入
  const anchor = document.getElementById('gadd-btn-' + parentId + '-' + type);
  if (anchor) {
    anchor.insertAdjacentElement('afterend', form);
  }
  form.querySelector('#ilf-text').focus();
}

function closeInlineForm() {
  document.querySelectorAll('.inline-form').forEach(el => el.remove());
  _inlineTarget = null;
}

function submitInlineForm(parentId, type) {
  const text = document.getElementById('ilf-text').value.trim();
  if (!text) { document.getElementById('ilf-text').focus(); return; }
  const deadline = document.getElementById('ilf-deadline').value;
  goalNodes.push({ id: newGoalId(), type, text, deadline, parentId: parentId || null });
  saveGoals();
  closeInlineForm();
  renderGoals(); renderHome(); refreshGoalLinkChips();
}

// ── ツリーレンダリング ──
function buildShortNode(s) {
  const prog = goalProgress(s.id);
  const statsHtml = prog ? ` <span class="gcard-short-stats">${prog.done}/${prog.total}</span>` : '';
  return `<div class="gcard-short">
    <span class="gcard-short-label">📘短期</span>
    <span class="gcard-short-text">${esc(s.text)}</span>
    ${s.deadline ? `<span class="gcard-short-dl">${s.deadline}</span>` : ''}
    ${statsHtml}
    <button class="gcard-del-btn" onclick="delGoal('${s.id}')">🗑</button>
  </div>`;
}

function buildMidNode(m) {
  const prog  = goalProgress(m.id);
  const statsHtml = prog ? `<div class="gcard-mid-stats">✅ ${prog.done}/${prog.total} (${prog.pct}%)</div>` : '';
  const shorts = goalNodes.filter(g => g.parentId === m.id && g.type === 'short');
  const shortsHtml = shorts.map(buildShortNode).join('');
  return `<div class="gcard-mid">
    <div class="gcard-mid-header">
      <div style="flex:1">
        <div class="gcard-mid-label">📗中期目標</div>
        <div class="gcard-mid-text">${esc(m.text)}</div>
        ${m.deadline ? `<div class="gcard-mid-dl">${m.deadline}</div>` : ''}
        ${statsHtml}
      </div>
      <button class="gcard-del-btn" onclick="delGoal('${m.id}')">🗑</button>
    </div>
    <div class="gcard-shorts">
      ${shortsHtml}
      <button class="gcard-add-btn" id="gadd-btn-${m.id}-short"
        onclick="showInlineForm('${m.id}','short')">＋ 短期目標を追加する</button>
    </div>
  </div>`;
}

function buildLongNode(l) {
  const prog  = goalProgress(l.id);
  const statsHtml = prog ? `<div class="gcard-long-stats">✅ ${prog.done}/${prog.total} (${prog.pct}%)</div>` : '';
  const mids  = goalNodes.filter(g => g.parentId === l.id && g.type === 'mid');
  const midsHtml = mids.map(buildMidNode).join('');
  return `<div class="gcard-long">
    <div class="gcard-long-header">
      <span class="gcard-long-icon">📙</span>
      <div class="gcard-long-body">
        <div class="gcard-long-label">長期目標（6ヶ月〜）</div>
        <div class="gcard-long-text">${esc(l.text)}</div>
        ${l.deadline ? `<div class="gcard-long-dl">📅 ${l.deadline}</div>` : ''}
        ${statsHtml}
      </div>
      <div class="gcard-long-actions">
        <button class="gcard-del-btn" onclick="delGoal('${l.id}')">🗑</button>
      </div>
    </div>
    <div class="gcard-mids">
      ${midsHtml}
      <button class="gcard-add-btn" id="gadd-btn-${l.id}-mid"
        onclick="showInlineForm('${l.id}','mid')">＋ 中期目標を追加する</button>
    </div>
  </div>`;
}

function buildOrphanMidNode(m) {
  const prog  = goalProgress(m.id);
  const statsHtml = prog ? `<div class="gcard-mid-stats">✅ ${prog.done}/${prog.total} (${prog.pct}%)</div>` : '';
  const shorts = goalNodes.filter(g => g.parentId === m.id && g.type === 'short');
  return `<div class="gcard-orphan-mid">
    <div class="gcard-mid-header">
      <div style="flex:1">
        <div class="gcard-mid-label">📗中期目標（長期未設定）</div>
        <div class="gcard-mid-text">${esc(m.text)}</div>
        ${m.deadline ? `<div class="gcard-mid-dl">${m.deadline}</div>` : ''}
        ${statsHtml}
      </div>
      <button class="gcard-del-btn" onclick="delGoal('${m.id}')">🗑</button>
    </div>
    <div class="gcard-shorts">
      ${shorts.map(buildShortNode).join('')}
      <button class="gcard-add-btn" id="gadd-btn-${m.id}-short"
        onclick="showInlineForm('${m.id}','short')">＋ 短期目標を追加する</button>
    </div>
  </div>`;
}

function renderGoals() {
  const area = document.getElementById('goal-tree-area');
  const longs      = goalNodes.filter(g => g.type === 'long');
  const orphanMids = goalNodes.filter(g => g.type === 'mid' && (!g.parentId || !goalNodes.find(n => n.id === g.parentId)));

  if (!longs.length && !orphanMids.length) {
    area.innerHTML = '<div class="goal-tree-empty">📙 まず下のフォームから長期目標を追加してみよう</div>';
  } else {
    area.innerHTML = longs.map(buildLongNode).join('') + orphanMids.map(buildOrphanMidNode).join('');
  }
}

//  CALENDAR VIEW
// ══════════════════════════════════════════════════════
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth=11; calYear--; }
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth=0; calYear++; }
  renderCalendar();
});

function renderCalendar() {
  const WDAYS = ['日','月','火','水','木','金','土'];
  const wdEl = document.getElementById('cal-weekdays');
  wdEl.innerHTML = WDAYS.map(w => `<div class="cal-weekday">${w}</div>`).join('');

  document.getElementById('cal-month-label').textContent = `${calYear}年${calMonth+1}月`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  const todayStr = todayKey();

  // build doneDates and recordDates sets
  const doneDates = new Set(todos.filter(t=>t.done && t.doneDate).map(t=>t.doneDate));
  const recDates  = new Set(records.map(r=>r.dateKey));

  let html = '';
  // prev month days
  for (let i=0; i<firstDay; i++) {
    const d = prevLast - firstDay + 1 + i;
    const key = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<div class="cal-day other-month">${d}</div>`;
  }
  // current month days
  for (let d=1; d<=lastDate; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = key === todayStr;
    const isSel   = key === calSelectedDate;
    const hasDone = doneDates.has(key);
    const hasRec  = recDates.has(key);
    const cls = [
      'cal-day',
      isToday ? 'today' : '',
      isSel   ? 'selected' : '',
      hasDone ? 'has-done' : '',
      hasRec  ? 'has-record' : ''
    ].join(' ');
    html += `<div class="${cls}" data-key="${key}" onclick="calSelect('${key}')">${d}</div>`;
  }
  // next month days
  const total = firstDay + lastDate;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i=1; i<=rem; i++) {
    html += `<div class="cal-day other-month">${i}</div>`;
  }
  document.getElementById('cal-days').innerHTML = html;

  if (calSelectedDate) showCalDetail(calSelectedDate);
}

function calSelect(key) {
  calSelectedDate = key;
  renderCalendar();
}

function showCalDetail(key) {
  const el = document.getElementById('cal-detail');
  const [y,m,d] = key.split('-');
  const dayTodos   = todos.filter(t => dateKey(new Date(t.createdAt)) === key || t.doneDate === key);
  const dayRecords = records.filter(r => r.dateKey === key);

  let html = `<div class="cal-detail-date">📅 ${y}年${parseInt(m)}月${parseInt(d)}日</div>`;

  if (dayTodos.length > 0) {
    html += `<div class="cal-detail-section">
      <div class="cal-detail-section-label">✅ タスク</div>`;
    html += dayTodos.map(t => `
      <div class="cal-detail-item ${t.done?'done':''}">
        ${t.done ? '✅' : '⬜'} ${esc(t.text)}
      </div>`).join('');
    html += '</div>';
  }

  if (dayRecords.length > 0) {
    html += `<div class="cal-detail-section">
      <div class="cal-detail-section-label">📝 振り返り</div>`;
    html += dayRecords.map(r => `
      <div class="cal-detail-item">${r.mood ? r.mood + ' ' : ''}${esc(r.text).replace(/\n/g,'<br>')}</div>`).join('');
    html += '</div>';
  }

  if (dayTodos.length===0 && dayRecords.length===0) {
    html += `<div class="empty-text" style="font-size:12px;color:var(--text-light);text-align:center;padding:16px">この日の記録はないよ〜</div>`;
  }

  el.innerHTML = html;
  el.style.display = 'block';
}

// ── キーワードベースの目標分解エンジン ──

      mid:  ['志望業界・職種の求人を20社リサーチする','職務経歴書・履歴書を完成させる','OB/OG訪問を3人行う'],
      short:['自分の強みと弱みをA4一枚にまとめる','転職サイトに登録して求人を眺める','現職での実績を数字で整理する']
    },
    {
      keys: ['英語','TOEIC','TOEFL','英会話','外国語','語学'],
      mid:  ['TOEIC公式問題集を2冊仕上げる','オンライン英会話を週3回のペースで続ける','英語日記を毎日書く習慣をつける'],
      short:['現在のスコアを把握するために模擬試験を受ける','単語帳アプリで毎日10単語覚える','好きな洋画を英語字幕で1本観る']
    },
    {
      keys: ['資格','検定','試験','合格','取得'],
      mid:  ['テキストを1周して全体像を把握する','過去問を3年分解いて弱点を洗い出す','苦手分野だけ集中して復習する'],
      short:['試験日程と出題範囲を調べてまとめる','学習スケジュールを手帳やアプリに書く','参考書を1冊選んで購入する']
    },
    {
      keys: ['副業','フリーランス','起業','開業','個人事業'],
      mid:  ['副業の収益目標と事業計画を紙に書く','SNSかポートフォリオサイトを開設する','月1件以上の案件獲得を目指す'],
      short:['副業の選択肢を5つ調べてメリット・デメリットを比較する','クラウドソーシングに登録してみる','本業後の作業可能時間を計算する']
    },
    {
      keys: ['筋肉','筋トレ','ダイエット','体重','痩せ','健康','運動','ジム','体脂肪'],
      mid:  ['週3回のトレーニングを3ヶ月継続する','食事記録アプリで摂取カロリーを管理する','ジムまたは自宅トレーニング環境を整える'],
      short:['現在の体重・体脂肪を記録する','1週間の食事内容を書き出してみる','10分の散歩を毎日の習慣にする']
    },
    {
      keys: ['プログラミング','開発','エンジニア','コーディング','アプリ','web','Web'],
      mid:  ['学習中の言語で小さなアプリを1つ完成させる','GitHubに週3回以上コミットする習慣をつける','技術ブログを月2本書いて発信する'],

    },

      mid:  ['月々の収支を家計簿アプリで把握する','固定費（サブスク・保険等）を見直す','積立NISAや投資口座を開設する'],
      short:['現在の資産・負債を全部書き出す','1ヶ月の無駄遣いトップ3を特定する','目標金額と期間から月の積立額を計算する']
    },

      mid:  ['月4冊を目標に読書記録をつける','読んだ本の要約をノートにまとめる','読書会やオンラインサロンに参加する'],

function renderAiResult(parsed) {
  const area = document.getElementById('ai-result-area');
  const midItems  = (parsed.mid   || []).slice(0, 3);
  const shortItems = (parsed.short || []).slice(0, 3);

  let midHtml = midItems.map((s, i) => `
    <div class="ai-suggestion-item" data-type="mid" data-idx="${i}" onclick="applyAiSuggestion(this,'mid','${esc(s)}')">
      <span class="ai-suggestion-check">📗</span>
      <span>${esc(s)}</span>
    </div>`).join('');

  let shortHtml = shortItems.map((s, i) => `
    <div class="ai-suggestion-item" data-type="short" data-idx="${i}" onclick="applyAiSuggestion(this,'short','${esc(s)}')">
      <span class="ai-suggestion-check">📘</span>
      <span>${esc(s)}</span>
    </div>`).join('');

  area.innerHTML = `
    <div class="ai-result-card">
      <div class="ai-result-title">💡 提案（タップで入力欄に反映）</div>
      <div class="ai-result-section">
        <div class="ai-result-section-label mid">📗 中期目標（1〜6ヶ月）</div>
        ${midHtml}
      </div>
      <div class="ai-result-section">
        <div class="ai-result-section-label short">📘 短期目標（〜1ヶ月）</div>
        ${shortHtml}
      </div>
      <button class="ai-apply-all-btn" onclick="applyAllAiSuggestions(${JSON.stringify(midItems)},${JSON.stringify(shortItems)})">
        📋 最初の提案をまとめて入力する
      </button>
    </div>`;
}

function applyAiSuggestion(el, type, text) {
  // テンプレ提案：クリックしたらインラインフォームを開いてテキストをセット
  const decoded = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  const icon = type === 'mid' ? '📗' : '📘';
  const isApplied = el.classList.contains('applied');
  document.querySelectorAll(`.ai-suggestion-item[data-type="${type}"].applied`).forEach(other => {
    other.classList.remove('applied');
    other.querySelector('.ai-suggestion-check').textContent = icon;
  });
  if (!isApplied) {
    el.classList.add('applied');
    el.querySelector('.ai-suggestion-check').textContent = '✅';
    // 長期目標のIDが1つあればそこへのインラインフォームを開く
    const longs = goalNodes.filter(g => g.type === 'long');
    if (type === 'mid' && longs.length === 1) {
      showInlineForm(longs[0].id, 'mid');
      const tfEl = document.getElementById('ilf-text');
      if (tfEl) tfEl.value = decoded;
    } else if (type === 'short') {
      const mids = goalNodes.filter(g => g.type === 'mid');
      if (mids.length === 1) {
        showInlineForm(mids[0].id, 'short');
        const tfEl = document.getElementById('ilf-text');
        if (tfEl) tfEl.value = decoded;
      }
    }
  }
}

function applyAllAiSuggestions(midItems, shortItems) {
  // 最初の中期提案をインラインフォームにセット
  const longs = goalNodes.filter(g => g.type === 'long');
  if (midItems[0] && longs.length >= 1) {
    showInlineForm(longs[0].id, 'mid');
    const tfEl = document.getElementById('ilf-text');
    if (tfEl) tfEl.value = midItems[0];
  }
  document.querySelectorAll('.ai-suggestion-item').forEach(el => {
    el.classList.remove('applied');
    el.querySelector('.ai-suggestion-check').textContent = el.dataset.type === 'mid' ? '📗' : '📘';
  });
  if (document.querySelector('.ai-suggestion-item[data-idx="0"][data-type="mid"]')) {
    const first = document.querySelector('.ai-suggestion-item[data-idx="0"][data-type="mid"]');
    first.classList.add('applied');
    first.querySelector('.ai-suggestion-check').textContent = '✅';
  }
}
